<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script type="text/x-mathjax-config">
    MathJax.Hub.Config({
      tex2jax: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      SVG: {
        font: 'TeX'
      }
    });
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@2/MathJax.js?config=TeX-AMS_SVG"></script>
</head>
<body>
  {% assign papers = site.pages | where: "paper", true | sort: "added" | reverse %}
  {% assign latest_paper = papers | first %}
  <header class="site-header">
    <nav class="nav" aria-label="Main navigation">
      <a class="brand" href="{{ '/' | relative_url }}">NashSAMA</a>
      <div class="nav-links">
        <a href="{{ '/world-model/' | relative_url }}">World Model</a>
        <a href="{{ '/vla/' | relative_url }}">VLA</a>
        {% if latest_paper %}
        <a href="{{ latest_paper.url | relative_url }}">Latest Note</a>
        {% endif %}
      </div>
    </nav>
  </header>

  <main class="page">
    {{ content }}
  </main>

  <footer class="site-footer">
    <span>Paper reading notes and research pages.</span>
  </footer>
</body>
</html>
